<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDKCraft</title>
  <meta name="description" content="JDKCraft Official Server" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script>
    (function () {
      var saved = localStorage.getItem('jdkcraft-theme');
      if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
    })();
  </script>
</head>
<body class="dashboard-body">

  <div class="dash-bg-grid"></div>
  <div class="dash-glow"></div>
  <div class="dash-glow-2"></div>

  <main class="dashboard">

    <a class="skye-back" href="https://judokacube.github.io">← main site</a>

    <header class="dash-hero fade-in">
      <span class="dash-eyebrow">// welcome to</span>
      <h1 class="dash-title">JDKCraft</h1>
      <p class="dash-desc">a minecraft server to have fun :D</p>
    </header>

    <div class="tile-grid jdkcraft-grid">

      <div class="tile tile-skin" id="skinTile">
        <div class="tile-spotlight" aria-hidden="true"></div>
        <div class="tile-head">
          <span class="tile-label">// owner</span>
        </div>
        <div class="mc-skin-canvas-wrap" id="mcSkinCanvasWrap">
          <canvas id="mcSkinCanvas"></canvas>
          <div class="mc-skin-loading" id="mcSkinLoading">loading...</div>
        </div>
        <h3 class="skin-name">JDKCube</h3>
        <p class="skin-hint">drag to rotate · scroll to zoom</p>
      </div>

      <button class="tile tile-ip" id="copyIpBtn">
        <div class="tile-spotlight" aria-hidden="true"></div>
        <div class="tile-head">
          <span class="tile-label">// connect</span>
        </div>
        <div class="ip-content">
          <div class="ip-icon">🎮</div>
          <div class="ip-text">
            <h3>mc.jdkcube.net</h3>
            <p id="ipHint">Click to copy IP</p>
          </div>
        </div>
      </button>

      <a href="https://discord.gg/VkgFsu5sjV" class="tile tile-launch tile-discord" target="_blank" rel="noopener noreferrer">
        <div class="tile-spotlight" aria-hidden="true"></div>
        <div class="tile-launch-icon discord-icon">
          <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.028zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
        </div>
        <div class="tile-launch-text">
          <h3>Join the Discord</h3>
          <p>Chat with the community</p>
        </div>
        <span class="tile-launch-arrow">↗</span>
      </a>

      <div class="tile tile-info">
        <div class="tile-spotlight" aria-hidden="true"></div>
        <div class="tile-head">
          <span class="tile-label">// info</span>
        </div>
        <div class="info-content">
          <p><strong>Version:</strong> <span id="infoVersion">loading...</span></p>
          <p><strong>Status:</strong> <span class="status-dot" id="infoStatusDot"></span> <span id="infoStatus">checking...</span></p>
          <p><strong>Players:</strong> <span id="infoPlayers">loading...</span></p>
          <p class="info-motd" id="infoMotd"></p>
        </div>
      </div>

    </div>
  </main>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle light / dark mode">
    <span class="theme-icon theme-icon-moon">🌙</span>
    <span class="theme-icon theme-icon-sun">☀️</span>
  </button>

  <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.1.0/bundles/skinview3d.bundle.js"></script>
  <script src="script.js"></script>
</body>
</html>
